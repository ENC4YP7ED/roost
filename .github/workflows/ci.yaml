name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Vet
        run: cd backend && go vet ./...
      - name: Test (race detector)
        run: cd backend && go test ./... -race -count=1
      - name: Coverage
        run: cd backend && go test ./internal/... -coverprofile=coverage.out && go tool cover -func=coverage.out | tail -1

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npx tsc --noEmit && npm run test
      - run: cd dbviewer-frontend && npm ci && npx tsc --noEmit

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build the panel
        run: make
      - name: Install Playwright
        run: cd e2e && npm install && npx playwright install --with-deps chromium
      - name: Run end-to-end tests
        run: cd e2e && npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/test-results/
